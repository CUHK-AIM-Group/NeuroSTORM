model: neurostorm
data_type: voxel
optimizer: AdamW
learning_rate: 0.00005
max_epochs: 30
batch_size: 8

model_args:
  embed_dim: 36
  depth: [2, 2, 6, 2]
  c_multiplier: 2
  last_layer_full_MSA: true
  clf_head_version: v1
  sequence_length: 20
  img_size: [96, 96, 96, 20]
  first_window_size: [4, 4, 4, 4]
  window_size: [4, 4, 4, 4]

pretrain:
  use_mae: true
  spatial_mask: window
  time_mask: random
  mask_ratio: 0.5

pretrained_ckpt: ./output/neurostorm/pt_neurostorm_mae_ratio0.5.ckpt
