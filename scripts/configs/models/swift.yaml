model: swift
data_type: voxel
optimizer: AdamW
learning_rate: 0.00005
max_epochs: 30
batch_size: 12

model_args:
  embed_dim: 36
  depth: [2, 2, 6, 2]
  c_multiplier: 2
  last_layer_full_MSA: true
  clf_head_version: v1
  sequence_length: 20
  img_size: [96, 96, 96, 20]
  first_window_size: [4, 4, 4, 4]
  window_size: [4, 4, 4, 4]

pretrain:
  use_contrastive: true
  contrastive_type: 1

pretrained_ckpt: ./output/volume-based/swift/pt_swift_contrastive_type1.ckpt
